services:
  nllb-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime-cpu
    container_name: nllb-service
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_BIND: 0.0.0.0:8080
      MODEL_DIR: /models/nllb-200-distilled-600M
      REQUEST_LOG_PATH: /logs/requests.jsonl
      DEFAULT_SOURCE_LANG: eng_Latn
      DEFAULT_TARGET_LANG: zho_Hans
      CT2_DEVICE: cpu
      CT2_COMPUTE_TYPE: auto
      CT2_THREADS: 0
      TRANSLATION_BEAM_SIZE: 4
      TRANSLATION_MAX_INPUT_LENGTH: 512
      TRANSLATION_MAX_DECODING_LENGTH: 256
    volumes:
      - ./models:/models
      - ./logs:/logs
