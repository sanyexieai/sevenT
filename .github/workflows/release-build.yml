name: release-build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-backend:
    name: backend-${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64-cpu
            runner: ubuntu-latest
            target_os: linux
            target_arch: x86_64
            cargo_args: --release --no-default-features
            binary_ext: ""
            build_flavor: cpu
          - label: windows-x86_64-cpu
            runner: windows-latest
            target_os: windows
            target_arch: x86_64
            cargo_args: --release --no-default-features
            binary_ext: .exe
            build_flavor: cpu
          - label: macos-x86_64-cpu
            runner: macos-13
            target_os: macos
            target_arch: x86_64
            cargo_args: --release --no-default-features
            binary_ext: ""
            build_flavor: cpu
          - label: macos-aarch64-cpu
            runner: macos-14
            target_os: macos
            target_arch: aarch64
            cargo_args: --release --no-default-features
            binary_ext: ""
            build_flavor: cpu

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build backend
        shell: bash
        run: cargo build ${{ matrix.cargo_args }}

      - name: Package backend artifact
        shell: bash
        env:
          TARGET_OS: ${{ matrix.target_os }}
          TARGET_ARCH: ${{ matrix.target_arch }}
          BUILD_FLAVOR: ${{ matrix.build_flavor }}
          BINARY_EXT: ${{ matrix.binary_ext }}
        run: |
          chmod +x scripts/package-backend-release.sh
          scripts/package-backend-release.sh

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.label }}
          path: .dist/*.tar.gz
          if-no-files-found: error

  build-backend-gpu-linux:
    name: backend-linux-x86_64-gpu
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.4.1-devel-ubuntu22.04
    steps:
      - name: Install build dependencies
        shell: bash
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates \
            build-essential \
            clang \
            cmake \
            curl \
            git \
            pkg-config \
            tar \
            zip

      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        shell: bash
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Build backend GPU release
        shell: bash
        run: cargo build --release

      - name: Package backend GPU artifact
        shell: bash
        env:
          TARGET_OS: linux
          TARGET_ARCH: x86_64
          BUILD_FLAVOR: gpu
        run: |
          chmod +x scripts/package-backend-release.sh
          scripts/package-backend-release.sh

      - name: Upload backend GPU artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-linux-x86_64-gpu
          path: .dist/*.tar.gz
          if-no-files-found: error

  build-extension:
    name: chrome-extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore CRX signing key
        if: ${{ secrets.CHROME_EXTENSION_PEM != '' }}
        shell: bash
        run: |
          mkdir -p .dist
          printf '%s' "${{ secrets.CHROME_EXTENSION_PEM }}" > .dist/nas-page-translator-extension.pem
          chmod 600 .dist/nas-page-translator-extension.pem

      - name: Package Chrome extension
        shell: bash
        run: |
          chmod +x scripts/package-extension.sh
          chmod +x scripts/package-extension-crx.sh
          scripts/package-extension.sh
          scripts/package-extension-crx.sh

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension
          path: |
            .dist/*.zip
            .dist/*.crx
          if-no-files-found: error

  publish-release:
    name: publish-release
    runs-on: ubuntu-latest
    needs:
      - build-backend
      - build-backend-gpu-linux
      - build-extension
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten assets
        shell: bash
        run: |
          mkdir -p final-assets
          find release-assets -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} final-assets/ \;
          ls -lah final-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: final-assets/*
          generate_release_notes: true
