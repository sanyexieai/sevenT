name: release-build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-backend:
    name: backend-${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64-cpu
            runner: ubuntu-latest
            target_os: linux
            target_arch: x86_64
            target_triple: x86_64-unknown-linux-gnu
            cargo_args: --release --no-default-features
            binary_ext: ""
            rustflags: ""
            archive_format: tar.gz
          - label: windows-x86_64-cpu
            runner: windows-latest
            target_os: windows
            target_arch: x86_64
            target_triple: x86_64-pc-windows-msvc
            cargo_args: --release --no-default-features
            binary_ext: .exe
            rustflags: -C target-feature=+crt-static
            archive_format: zip
          - label: macos-aarch64-cpu
            runner: macos-latest
            target_os: macos
            target_arch: aarch64
            target_triple: aarch64-apple-darwin
            cargo_args: --release --no-default-features
            binary_ext: ""
            rustflags: ""
            archive_format: tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target_triple }}

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target_triple }}

      - name: Build backend
        shell: bash
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build ${{ matrix.cargo_args }}

      - name: Package backend artifact
        shell: bash
        env:
          TARGET_OS: ${{ matrix.target_os }}
          TARGET_ARCH: ${{ matrix.target_arch }}
          BUILD_FLAVOR: cpu
          BINARY_EXT: ${{ matrix.binary_ext }}
          BINARY_PATH: target/${{ matrix.target_triple }}/release/nas-nllb-service${{ matrix.binary_ext }}
          ARCHIVE_FORMAT: ${{ matrix.archive_format }}
        run: |
          if [[ ! -f "$BINARY_PATH" ]]; then
            BINARY_PATH="target/release/nas-nllb-service${BINARY_EXT}"
          fi
          export BINARY_PATH
          chmod +x scripts/package-backend-release.sh
          scripts/package-backend-release.sh
          ls -lah .dist

      - name: Stage backend artifacts
        shell: bash
        run: |
          rm -rf artifact-backend
          mkdir -p artifact-backend
          find .dist -maxdepth 1 \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} artifact-backend/ \;
          ls -lah artifact-backend

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.label }}
          path: artifact-backend/
          if-no-files-found: error

  build-extension:
    name: chrome-extension
    runs-on: ubuntu-latest
    env:
      CHROME_EXTENSION_PEM: ${{ secrets.CHROME_EXTENSION_PEM }}
    steps:
      - uses: actions/checkout@v4

      - name: Install extension build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends zip openssl

      - name: Restore CRX signing key
        if: ${{ env.CHROME_EXTENSION_PEM != '' }}
        shell: bash
        run: |
          mkdir -p .dist
          printf '%s' "$CHROME_EXTENSION_PEM" > .dist/nas-page-translator-extension.pem
          chmod 600 .dist/nas-page-translator-extension.pem

      - name: Package Chrome extension zip
        shell: bash
        run: |
          chmod +x scripts/package-extension.sh
          scripts/package-extension.sh
          ls -lah .dist

      - name: Package Chrome extension crx when browser is available
        shell: bash
        run: |
          if command -v google-chrome-stable >/dev/null 2>&1 || command -v google-chrome >/dev/null 2>&1 || command -v chromium >/dev/null 2>&1 || command -v chromium-browser >/dev/null 2>&1; then
            chmod +x scripts/package-extension-crx.sh
            scripts/package-extension-crx.sh
          else
            echo "Skip CRX packaging: no Chrome/Chromium binary on runner."
          fi
          ls -lah .dist

      - name: Stage extension artifacts
        shell: bash
        run: |
          rm -rf artifact-extension
          mkdir -p artifact-extension
          cp .dist/*.zip artifact-extension/
          find .dist -maxdepth 1 -name '*.crx' -exec cp {} artifact-extension/ \;
          ls -lah artifact-extension

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension
          path: artifact-extension/
          if-no-files-found: error

  publish-release:
    name: publish-release
    runs-on: ubuntu-latest
    needs:
      - build-backend
      - build-extension
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten assets
        shell: bash
        run: |
          mkdir -p final-assets
          find release-assets -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.crx' \) -exec cp {} final-assets/ \;
          ls -lah final-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: final-assets/*
          generate_release_notes: true
